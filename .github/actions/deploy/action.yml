name: 'Deploy Application/Service'
description: 'Deploy service'
inputs:
  environments: 
    description: 'Enviroment for usage'
    required: true
  ports: 
    required: true
runs:
    using: composite
    steps:
      - uses: actions/checkout@v6
        with: 
          repository: "mtararujs/python-greetings"
          clean: 'false'
          path: 'e2e-api-deploy'
      - name: delete existing
        working-directory: ./e2e-api-deploy
        run: pm2 delete greetings-app-${{ inputs.environments }} & EXIT /B 0
        shell: cmd

      - name: start new pm2
        working-directory: ./e2e-api-deploy
        ##run: pm2 start app.py --name greetings-app-${{ inputs.environments }} --interpreter python -- --port ${{ inputs.ports }}
        ##run: pm2 start app.py -n greetings-app-${{ inputs.environments }} --interpreter %CD%\\venv\\Scripts\\python.exe -- --port ${{ inputs.ports }}
        run: pm2 start app.py - n greetings-app-${{ inputs.environments }} --interpreter C:\shared\venvs\greetings\Scripts\python.exe -- --port ${{ inputs.ports }}
        shell: cmd