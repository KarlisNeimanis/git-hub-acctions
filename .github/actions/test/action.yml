name: 'Run Application test'
description: 'Run test'
inputs:
  environments: 
    description: 'Enviroment for usage'
    required: true

runs:
    using: composite
    steps:
      - uses: actions/checkout@v6
        with: 
          repository: "mtararujs/course-js-api-framework"
          clean: 'false'
          path: 'e2e-api-test'

      - name: Test ${{ inputs.environments }}
        run: echo "test to ${{ inputs.environments }}"
        shell: cmd

      - name: npm install
        working-directory: ./e2e-api-test
        run: npm install
        shell: cmd

      - name: run
        working-directory: ./e2e-api-test
        run: npm run greetings
        shell: cmd
        env:
          ENV: ${{ inputs.environments }}
 