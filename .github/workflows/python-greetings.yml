name: github actions App Workflow

on: 
  push: 
    branches: ["main"]
  workflow_dispatch:

jobs: 
  install-pip-deps:
    runs-on: self-hosted
    steps: 
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install
        with:
          environments: "dev"

  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps
    steps: 
      - uses: actions/checkout@v6
      - uses: ./.github/actions/deploy
        with:
          environments: "dev"
          ports: 7001

  test-on-dev: 
    runs-on: self-hosted
    needs: deploy-to-dev
    steps: 
      - uses: actions/checkout@v6
      - uses: ./.github/actions/test
        with:
          environments: "dev"

  deploy-to-stg:
    runs-on: self-hosted
    needs: test-on-dev
    steps: 
      - uses: actions/checkout@v6
      - uses: ./.github/actions/deploy
        with:
          environments: "stg"
          ports: 7002

  test-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg
    steps: 
      - uses: actions/checkout@v6
      - uses: ./.github/actions/test
        with:
          environments: "stg"

  deploy-to-preprod: 
    runs-on: self-hosted
    needs: test-on-stg
    steps: 
      - uses: actions/checkout@v6
      - uses: ./.github/actions/deploy
        with:
          environments: "preprod"
          ports: 7003

  test-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod
    steps: 
      - uses: actions/checkout@v6
      - uses: ./.github/actions/test
        with:
          environments: "preprod"

  deploy-to-prd:
    runs-on: self-hosted
    needs: test-on-preprod
    steps: 
      - uses: actions/checkout@v6
      - uses: ./.github/actions/deploy
        with:
          environments: "prd"
          ports: 7004

  test-on-prd: 
    runs-on: self-hosted
    needs: deploy-to-prd
    steps: 
      - uses: actions/checkout@v6
      - uses: ./.github/actions/test
        with:
          environments: "prd"