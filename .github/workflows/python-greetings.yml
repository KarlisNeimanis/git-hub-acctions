name: github actions App Workflow

on: 
  push: 
    branches: ["main"]
  workflow_dispatch:

jobs: 
  install-pip-deps:
    runs-on: self-hosted
    steps: 
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Installing all necessary node dependencies.."
  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps
    steps: 
      - uses: ./github/actions/deploy
        with:
          enviroment: "DEV"
          port: 1010
  test-on-dev: 
    runs-on: self-hosted
    needs: deploy-to-dev
    steps: 
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Testing DEV in this step"
  deploy-to-stg:
    runs-on: self-hosted
    needs: test-on-dev
    steps: 
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Deployment to STG enviroment"
  test-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg
    steps: 
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Testing STG in this step"
  deploy-to-preprod: 
    runs-on: self-hosted
    needs: test-on-stg
    steps: 
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Deployment to PREPROD enviroment"
  test-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod
    steps: 
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Testing PREPROD in this step"
  deploy-to-prd:
    runs-on: self-hosted
    needs: test-on-preprod
    steps: 
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Deployment to PRD"
  test-on-prd: 
    runs-on: self-hosted
    needs: deploy-to-prd
    steps: 
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Testing PRD in this step"